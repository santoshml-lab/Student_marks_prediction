<!DOCTYPE html>
<html>
<head>
  <title>ML Predictor</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    input {
      padding: 10px;
      margin: 10px;
      width: 220px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px 25px;
      background: #22c55e;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 5px;
    }

    .box {
      margin-top: 20px;
      font-size: 20px;
    }
  </style>
</head>

<body>

<h1>🎯 Student Result Predictor</h1>

<input id="hours" placeholder="Study Hours" />
<br>
<input id="marks" placeholder="Marks" />
<br>

<button onclick="predict()">Predict</button>

<div class="box" id="output"></div>

<script>
async function predict() {
  try {
    let hours = document.getElementById("hours").value;
    let marks = document.getElementById("marks").value;

    let res = await fetch("https://studentsmarks-teaf.onrender.com/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        study_hours: Number(hours),
        marks: Number(marks)
      })
    });

    let data = await res.json();

    document.getElementById("output").innerHTML =
      "Result: " + data.result;

  } catch (e) {
    document.getElementById("output").innerHTML =
      "API Error ❌";
  }
}
</script>

</body>
</html>
